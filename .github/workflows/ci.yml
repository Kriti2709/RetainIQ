name: RetainIQ CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade Pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          pip install pandas
          pip install numpy
          pip install faker
          pip install scikit-learn
          pip install xgboost
          pip install joblib
          pip install fastapi
          pip install uvicorn
          pip install pydantic
          pip install streamlit
          pip install plotly

      - name: Verify Imports
        run: |
          python -c "import pandas"
          python -c "import numpy"
          python -c "import sklearn"
          python -c "import xgboost"
          python -c "import fastapi"

      - name: Verify Model Training Module
        run: |
          python -m py_compile models/train.py

      - name: Verify API Module
        run: |
          python -m py_compile api/main.py

      - name: Verify Dashboard Module
        run: |
          python -m py_compile dashboard/app.py

      - name: CI Passed
        run: echo "RetainIQ CI pipeline completed successfully"
